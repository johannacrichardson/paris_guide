<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris Shopping Guide</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f9f7f4;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: #fff;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid #e8e6e1;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: Georgia, serif;
            font-size: 2.5rem;
            color: #2c2c2c;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        #map {
            width: 100%;
            height: 420px;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.4rem 0.9rem;
            border: 1px solid #d0ccc5;
            background: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: #f5f3f0;
        }

        .filter-btn.active {
            background: #2c2c2c;
            color: #fff;
            border-color: #2c2c2c;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .card.highlighted {
            box-shadow: 0 0 0 3px rgba(44, 44, 44, 0.2);
        }

        .card-header {
            padding: 1.5rem 1.5rem 1rem;
            flex: 1;
        }

        .card-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.8rem;
        }

        .card-title {
            font-family: Georgia, serif;
            font-size: 1.4rem;
            color: #2c2c2c;
            margin-bottom: 0.3rem;
        }

        .card-neighborhood {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 1rem;
        }

        .card-description {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .card-hours {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .card-address {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: #faf8f5;
            border-radius: 4px;
        }

        .card-footer {
            padding: 0 1.5rem 1.5rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .card-link {
            flex: 1;
            min-width: 150px;
            padding: 0.6rem 1rem;
            text-align: center;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .website-link {
            background: #e8e6e1;
            color: #2c2c2c;
            border: 1px solid #d0ccc5;
        }

        .website-link:hover {
            background: #d8d5ce;
        }

        .directions-link {
            background: #5a7b8f;
            color: #fff;
            border: none;
        }

        .directions-link:hover {
            background: #476575;
        }

        footer {
            background: #fff;
            padding: 2rem 1rem;
            text-align: center;
            border-top: 1px solid #e8e6e1;
            color: #999;
            font-size: 0.85rem;
            margin-top: 3rem;
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 1.8rem;
            }

            #map {
                height: 320px;
            }

            .cards-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .filters {
                justify-content: flex-start;
                gap: 0.5rem;
            }

            .filter-btn {
                padding: 0.3rem 0.7rem;
                font-size: 0.8rem;
            }

            .card-footer {
                flex-direction: column;
            }

            .card-link {
                min-width: auto;
                width: 100%;
            }
        }

        .marker-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        }
    </style>
</head>

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-badge" style="background: ${colors.badge}; color: ${colors.text};">${shop.category}</div>
                        <h2 class="card-title">${shop.name}</h2>
                        <p class="card-neighborhood">${shop.neighborhood}</p>
                        <p class="card-description">${shop.description}</p>
                        <p class="card-hours">${shop.hours}</p>
                    </div>
                    <div class="card-address">${shop.address}</div>
                    <div class="card-footer">
                        <a href="https://${shop.website}" target="_blank" class="card-link website-link">Website</a>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${shop.lat},${shop.lng}&travelmode=walking" target="_blank" class="card-link directions-link">Directions</a>
                    </div>
                `;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
                    card.classList.add('highlighted');
                    if (markers[shop.id]) {
                        markers[shop.id].openPopup();
                        map.setView([shop.lat, shop.lng], 15);
                    }
                });
                container.appendChild(card);
            });
        }

        renderCards(shops);

        shops.forEach(shop => {
            const colors = categoryColors[shop.category];
            const marker = L.circleMarker([shop.lat, shop.lng], {
                radius: 16,
                fillColor: colors.dot,
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.85
            }).addTo(map);

            const popupContent = `<div style="font-family: Georgia, serif;"><strong>${shop.name}</strong><br><small>${shop.neighborhood}</small></div>`;
            marker.bindPopup(popupContent);

            marker.on('click', () => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
                const card = document.getElementById(`card-${shop.id}`);
                if (card) {
                    card.classList.add('highlighted');
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });

            markers[shop.id] = marker;
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const category = btn.getAttribute('data-category');
                const filtered = category === 'all' ? shops : shops.filter(s => s.category === category);
                renderCards(filtered);
                shops.forEach(shop => {
                    if (category === 'all' || shop.category === category) {
                        markers[shop.id].addTo(map);
                    } else {
                        markers[shop.id].removeFrom(map);
                    }
                });
            });
        });
    </script>
</body>
</html>
