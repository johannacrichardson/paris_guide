<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris Shopping Guide</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/352/352642.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5eded;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: #fff;
            padding: 1.2rem 1rem;
            text-align: center;
            border-bottom: 1px solid #e8e6e1;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: Georgia, serif;
            font-size: 1.8rem;
            color: #2c2c2c;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        #map {
            width: 100%;
            height: 420px;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.4rem 0.9rem;
            border: 1px solid #d0ccc5;
            background: #fff;
            color: #5a6b7a;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: #f5f3f0;
        }

        .filter-btn.active {
            background: #2c2c2c;
            color: #fff;
            border-color: #2c2c2c;
        }

        .suggest-cta {
            text-align: center;
            font-size: 0.85rem;
            color: #999;
            font-style: italic;
            margin: 0.1rem 0 1.5rem;
        }

        .suggest-cta a {
            color: #5a6b7a;
            text-decoration: underline;
            transition: color 0.2s ease;
        }

        .suggest-cta a:hover {
            color: #333;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .card.highlighted {
            box-shadow: 0 0 0 3px rgba(44, 44, 44, 0.2);
        }

        .card-header {
            padding: 1.1rem 1.3rem 0.75rem;
            flex: 1;
        }

        .card-badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            margin-left: 0;
            vertical-align: top;
        }

        .card-title {
            font-family: Georgia, serif;
            font-size: 1.25rem;
            color: #2c2c2c;
            margin-bottom: 0.2rem;
            line-height: 1.2;
        }

        .card-neighborhood {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0.6rem;
        }

        .card-description {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.45;
            margin-bottom: 0.6rem;
        }

        .card-hours {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 0;
            font-style: italic;
        }

        .card-website {
            font-size: 0.8rem;
            color: #999;
            font-style: italic;
            margin-bottom: 0.6rem;
        }

        .card-website a {
            color: #999;
            text-decoration: underline;
            transition: color 0.2s ease;
        }

        .card-website a:hover {
            color: #666;
        }

        .card-address {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0;
            padding: 0.6rem 0.75rem 0.1rem;
            background: #faf8f5;
            border-radius: 4px 4px 0 0;
        }

        .card-metro {
            font-size: 0.8rem;
            color: #888;
            padding: 0 0.75rem 0.6rem;
            background: #faf8f5;
            border-radius: 0 0 4px 4px;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .directions-inline {
            font-size: 0.8rem;
            color: #999;
            text-decoration: none;
            transition: color 0.2s ease;
            white-space: nowrap;
        }

        .directions-inline:hover {
            color: #555;
        }

        .suggestion-box {
            max-width: 500px;
            margin: 3rem auto 0;
            padding: 0 1rem;
            text-align: center;
        }

        .suggestion-title {
            font-family: Georgia, serif;
            font-size: 1.2rem;
            color: #2c2c2c;
            margin-bottom: 0.2rem;
        }

        .suggestion-subtitle {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 1rem;
        }

        .suggestion-form {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .suggestion-input {
            padding: 0.6rem 0.75rem;
            border: 1px solid #d0ccc5;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: system-ui, sans-serif;
            background: #fff;
            color: #2c2c2c;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .suggestion-input:focus {
            border-color: #5a6b7a;
        }

        .suggestion-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .suggestion-submit {
            padding: 0.5rem 1.5rem;
            background: #2c2c2c;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
            align-self: flex-start;
            margin: 0 auto;
        }

        .suggestion-submit:hover {
            background: #444;
        }

        .suggestion-thanks {
            font-size: 0.9rem;
            color: #6b8f47;
            margin-top: 0.75rem;
            font-style: italic;
        }

        footer {
            background: #fff;
            padding: 2rem 1rem;
            text-align: center;
            border-top: 1px solid #e8e6e1;
            color: #999;
            font-size: 0.85rem;
            margin-top: 3rem;
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 1.4rem;
            }

            #map {
                height: 320px;
            }

            .cards-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .filters {
                justify-content: center;
                gap: 0.5rem;
            }

            .filter-btn {
                padding: 0.3rem 0.7rem;
                font-size: 0.8rem;
            }

            .card-footer {
                flex-direction: column;
            }

            .card-link {
                min-width: auto;
                width: 100%;
            }
        }

        .marker-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        }

        .card-thumb {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            float: right;
            margin: 0 0 0.5rem 0.75rem;
            flex-shrink: 0;
            position: relative;
            top: 0;
        }

        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #2c2c2c;
            color: #fff;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .back-to-top.visible {
            display: flex;
        }

        .leaflet-popup-content .popup-desc {
            font-size: 0.85rem;
            color: #555;
            margin: 0.4rem 0;
            line-height: 1.4;
        }

        .leaflet-popup-content .popup-link {
            display: inline-block;
            margin-top: 0.4rem;
            font-size: 0.8rem;
            color: #5a7b8f;
            text-decoration: none;
            font-weight: 500;
        }

        .leaflet-popup-content .popup-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Paris Shopping Guide</h1>
        <p class="subtitle">A curated list of 59 boutiques, vintage shops, markets, and concept stores across Paris.</p>
    </header>

    <div class="container">
        <div id="map"></div>

        <div class="filters">
            <button class="filter-btn active" data-category="all">All Shops</button>
            <button class="filter-btn" data-category="Beauty">Beauty</button>
            <button class="filter-btn" data-category="Concept Store">Concept Store</button>
            <button class="filter-btn" data-category="Department Store">Department Store</button>
            <button class="filter-btn" data-category="Designer">Designer</button>
            <button class="filter-btn" data-category="Eyewear">Eyewear</button>
            <button class="filter-btn" data-category="Fashion">Fashion</button>
            <button class="filter-btn" data-category="Books">Books</button>
            <button class="filter-btn" data-category="Flea Market">Flea Market</button>
            <button class="filter-btn" data-category="Food">Food</button>
            <button class="filter-btn" data-category="Home Goods">Home Goods</button>
            <button class="filter-btn" data-category="Stationery">Stationery</button>
            <button class="filter-btn" data-category="Vintage">Vintage</button>
        </div>
        <p class="suggest-cta">Know a fab place? <a href="#suggestion-box" onclick="document.getElementById('suggestion-box').scrollIntoView({behavior:'smooth'}); return false;">Tell me about it.</a></p>

        <div class="cards-container" id="cards-container"></div>
    </div>

    <div class="suggestion-box" id="suggestion-box">
        <h2 class="suggestion-title">Know a great shop?</h2>
        <p class="suggestion-subtitle">Suggest a place to add to the guide.</p>
        <form action="https://formspree.io/f/mnjgkbpj" method="POST" class="suggestion-form" id="suggestion-form">
            <textarea name="suggestion" placeholder="Shop name(s)" required class="suggestion-input suggestion-textarea"></textarea>
            <input type="text" name="name" placeholder="Recommended by" required class="suggestion-input">
            <button type="submit" class="suggestion-submit">Submit</button>
        </form>
        <p class="suggestion-thanks" id="suggestion-thanks" style="display:none;">Thanks for your suggestion!</p>
    </div>

    <button class="back-to-top" id="back-to-top" title="Back to top">↑</button>

    <footer>
        <p>Map tiles © OpenStreetMap contributors, © CARTO</p>
    </footer>

            const stationMatch = metroStr.match(/^(.+?)\s*\(Line/);
            const station = stationMatch ? stationMatch[1] : metroStr;
            const lineNums = [...metroStr.matchAll(/\d+/g)].map(m => parseInt(m[0]));
            const coloredNums = lineNums.map(n =>
                `<span style="display:inline-flex;align-items:center;justify-content:center;background:${metroLineColors[n]||'#888'};color:${[1,9,10,13].includes(n)?'#333':'#fff'};font-weight:700;font-size:0.7rem;width:1.15rem;height:1.15rem;border-radius:50%;line-height:1;">${n}</span>`
            ).join(' ');
            return `Ⓜ ${coloredNums} ${station}`;
        }

        const categoryColors = {
            "Fashion": { dot: "#c45a3c", badge: "#f0d8cf", text: "#8a3020" },
            "Beauty": { dot: "#b44d7e", badge: "#f0cfdf", text: "#7a2850" },
            "Eyewear": { dot: "#4a7fa5", badge: "#cfe0f0", text: "#2a5070" },
            "Concept Store": { dot: "#6b8f47", badge: "#d8eacf", text: "#3a5520" },
            "Home Goods": { dot: "#8a7242", badge: "#e8ddcf", text: "#5a4820" },
            "Vintage": { dot: "#8b5c5c", badge: "#e8d5d5", text: "#5a2828" },
            "Food": { dot: "#c4883c", badge: "#f0e0cf", text: "#8a5520" },
            "Flea Market": { dot: "#7a5b8a", badge: "#ddd0e8", text: "#4a3060" },
            "Designer": { dot: "#d4a017", badge: "#faf0c8", text: "#7a5c00" },
            "Books": { dot: "#2e6b6b", badge: "#c8dede", text: "#1a4040" },
            "Stationery": { dot: "#a0628a", badge: "#ebd4e5", text: "#6a2a5a" },
            "Department Store": { dot: "#3a3a5c", badge: "#d0d0e0", text: "#22224a" }
        };

        const map = L.map('map').setView([48.862, 2.345], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors, © CARTO',
            maxZoom: 19
        }).addTo(map);

        const markers = {};

        function renderCards(filteredShops) {
            function arrNum(hood) {
                const m = hood.match(/(\d+)\w*\s*arr/);
                return m ? parseInt(m[1]) : 99;
            }
            const sorted = [...filteredShops].sort((a, b) => arrNum(a.neighborhood) - arrNum(b.neighborhood) || a.neighborhood.localeCompare(b.neighborhood) || a.name.localeCompare(b.name));
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            sorted.forEach(shop => {
                const colors = categoryColors[shop.category];
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${shop.id}`;
                const thumbHtml = shop.image ? `<img class="card-thumb" src="${shop.image}" alt="${shop.name}" onerror="this.style.display='none'" loading="lazy">` : '';
                card.innerHTML = `
                    <div class="card-header">
                        ${thumbHtml}
                        <div class="card-badge" style="background: ${colors.badge}; color: ${colors.text};">${shop.category}</div>
                        <h2 class="card-title">${shop.name}</h2>
                        <p class="card-neighborhood">${shop.neighborhood}</p>
                        <p class="card-description">${shop.description}</p>
                        <p class="card-hours">${shop.hours}</p>
                        <p class="card-website"><a href="https://${shop.website}" target="_blank">Website</a></p>
                    </div>
                    <div class="card-address">${shop.address}</div>
                    <div class="card-metro"><span>${formatMetro(shop.metro)}</span><a href="https://www.google.com/maps/dir/?api=1&destination=${shop.lat},${shop.lng}&travelmode=walking" target="_blank" class="directions-inline">Directions →</a></div>
                `;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
                    card.classList.add('highlighted');
                    if (markers[shop.id]) {
                        markers[shop.id].openPopup();
                        map.setView([shop.lat, shop.lng], 15);
                    }
                });
                container.appendChild(card);
            });
        }

        renderCards(shops);

        shops.forEach(shop => {
            const colors = categoryColors[shop.category];
            const marker = L.circleMarker([shop.lat, shop.lng], {
                radius: 16,
                fillColor: colors.dot,
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.85
            }).addTo(map);

            const popupContent = `<div style="font-family: system-ui, sans-serif; max-width: 220px;">
                <strong style="font-family: Georgia, serif; font-size: 1rem;">${shop.name}</strong><br>
                <small style="color: #888;">${shop.neighborhood}</small>
                <p class="popup-desc">${shop.description}</p>
                <a href="#card-${shop.id}" class="popup-link" onclick="document.getElementById('card-${shop.id}').scrollIntoView({behavior:'smooth',block:'center'}); document.querySelectorAll('.card').forEach(c=>c.classList.remove('highlighted')); document.getElementById('card-${shop.id}').classList.add('highlighted'); return false;">View listing ↓</a>
            </div>`;
            marker.bindPopup(popupContent);

            markers[shop.id] = marker;
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const category = btn.getAttribute('data-category');
                const filtered = category === 'all' ? shops : shops.filter(s => s.category === category);
                renderCards(filtered);
                shops.forEach(shop => {
                    if (category === 'all' || shop.category === category) {
                        markers[shop.id].addTo(map);
                    } else {
                        markers[shop.id].removeFrom(map);
                    }
                });
            });
        });

        // Back to top button
        const backToTop = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });
        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        const suggestionForm = document.getElementById('suggestion-form');
        suggestionForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const data = new FormData(suggestionForm);
            fetch(suggestionForm.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    suggestionForm.style.display = 'none';
                    document.getElementById('suggestion-thanks').style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
